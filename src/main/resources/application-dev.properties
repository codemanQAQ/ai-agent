# =============================================================================
# application-dev.properties (slim)
# 大部分 dev 配置已迁移到项目根目录的 .env（gitignored，本地维护）。
# 这里只保留 dev profile 独有、且不适合放在 .env 里的覆盖项。
#
# 加载顺序：application.properties → 此文件 → .env（通过 spring.config.import）
# 注：spring.config.import 在 application.properties 中声明，因此 .env 对所有 profile 生效，
# 但本文件中显式声明的 key 优先级更高，可用于 dev 专属覆盖。
# =============================================================================

# 开发环境暴露 loggers 端点，便于动态调整日志级别
management.endpoints.web.exposure.include=health,info,metrics,loggers
# 开发环境展示完整健康详情
management.endpoint.health.show-details=always
