spring.application.name=${SPRING_APPLICATION_NAME:backend}
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api/v1

# spring \u5F00\u542F\u865A\u62DF\u7EBF\u7A0B\u652F\u6301
spring.threads.virtual.enabled=true

# \u79BB\u7EBF\u94FE\u8DEF\u6587\u4EF6\u4E0A\u4F20\u9650\u5236
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:20MB}

# \u6570\u636E\u6E90\u914D\u7F6E (\u4EC5\u4FDD\u7559\u5360\u4F4D\u7B26\uFF0C\u4E0D\u5199\u6B7B\u4EFB\u4F55\u5BC6\u94A5)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:neondb}?sslmode=${PGSSLMODE:disable}}
spring.datasource.username=${PGUSER:neondb_owner}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# \u521D\u59CB\u5316\u914D\u7F6E
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}
spring.sql.init.schema-locations=classpath:schema.sql

# Actuator \u76D1\u63A7
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics}
management.endpoint.health.show-details=always

# Mail
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

# Final failure email notification
rag.notification.final-failure-email.enabled=${RAG_NOTIFICATION_FINAL_FAILURE_EMAIL_ENABLED:false}
rag.notification.final-failure-email.from=${RAG_NOTIFICATION_FINAL_FAILURE_EMAIL_FROM:}
rag.notification.final-failure-email.subject-prefix=${RAG_NOTIFICATION_FINAL_FAILURE_EMAIL_SUBJECT_PREFIX:[RAG]}
rag.notification.final-failure-email.base-url=${RAG_NOTIFICATION_FINAL_FAILURE_EMAIL_BASE_URL:}

# RocketMQ parse failure alert email notification
rag.notification.message-parse-failure-email.enabled=${RAG_NOTIFICATION_MESSAGE_PARSE_FAILURE_EMAIL_ENABLED:false}
rag.notification.message-parse-failure-email.from=${RAG_NOTIFICATION_MESSAGE_PARSE_FAILURE_EMAIL_FROM:}
rag.notification.message-parse-failure-email.recipients=${RAG_NOTIFICATION_MESSAGE_PARSE_FAILURE_EMAIL_RECIPIENTS:}
rag.notification.message-parse-failure-email.subject-prefix=${RAG_NOTIFICATION_MESSAGE_PARSE_FAILURE_EMAIL_SUBJECT_PREFIX:[RAG]}

# Spring AI OpenAI \u914D\u7F6E
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:${OPENAI_API_KEY:}}
# Spring AI \u4F1A\u81EA\u884C\u8865 /v1/* \u8DEF\u5F84\uFF0C\u8FD9\u91CC\u4FDD\u6301\u548C dev \u4E00\u81F4\uFF0C\u4E0D\u989D\u5916\u62FC /v1
spring.ai.openai.base-url=${SPRING_AI_OPENAI_BASE_URL:${OPENAI_API_URL:https://api.openai.com}}
spring.ai.openai.embedding.options.model=${SPRING_AI_OPENAI_EMBEDDING_MODEL:text-embedding-v3}
spring.ai.openai.embedding.options.dimensions=${SPRING_AI_OPENAI_EMBEDDING_DIMENSIONS:1024}

# RAG \u57FA\u7840\u914D\u7F6E
rag.default-top-k=${RAG_DEFAULT_TOP_K:6}
rag.chunk-size=${RAG_CHUNK_SIZE:400}
rag.chunk-overlap=${RAG_CHUNK_OVERLAP:80}
rag.embedding-model=${RAG_EMBEDDING_MODEL:text-embedding-v4}
rag.indexing.max-retries=${RAG_INDEXING_MAX_RETRIES:3}
rag.indexing.retry-backoff-millis=${RAG_INDEXING_RETRY_BACKOFF_MILLIS:1000}
rag.indexing.embedding-cache-enabled=${RAG_INDEXING_EMBEDDING_CACHE_ENABLED:true}
rag.query-transformation.enabled=${RAG_QUERY_TRANSFORMATION_ENABLED:true}
rag.query-transformation.use-model=${RAG_QUERY_TRANSFORMATION_USE_MODEL:true}
rag.query-transformation.min-conversation-turns=${RAG_QUERY_TRANSFORMATION_MIN_CONVERSATION_TURNS:3}
rag.query-transformation.query-template=${RAG_QUERY_TRANSFORMATION_QUERY_TEMPLATE:}
rag.query-transformation.min-question-length=${RAG_QUERY_TRANSFORMATION_MIN_QUESTION_LENGTH:0}
rag.query-transformation.min-question-tokens=${RAG_QUERY_TRANSFORMATION_MIN_QUESTION_TOKENS:0}
rag.query-transformation.min-history-turns=${RAG_QUERY_TRANSFORMATION_MIN_HISTORY_TURNS:0}
rag.query-transformation.timeout-millis=${RAG_QUERY_TRANSFORMATION_TIMEOUT_MILLIS:2000}
rag.query-transformation.rewrite-enabled=${RAG_QUERY_TRANSFORMATION_REWRITE_ENABLED:true}
rag.query-transformation.rewrite-use-model=${RAG_QUERY_TRANSFORMATION_REWRITE_USE_MODEL:true}
rag.query-transformation.rewrite-query-template=${RAG_QUERY_TRANSFORMATION_REWRITE_QUERY_TEMPLATE:}
rag.query-transformation.rewrite-target-search-system=${RAG_QUERY_TRANSFORMATION_REWRITE_TARGET_SEARCH_SYSTEM:}
rag.query-expansion.enabled=${RAG_QUERY_EXPANSION_ENABLED:true}
rag.query-expansion.use-model=${RAG_QUERY_EXPANSION_USE_MODEL:true}
rag.query-expansion.include-original=${RAG_QUERY_EXPANSION_INCLUDE_ORIGINAL:true}
rag.query-expansion.number-of-queries=${RAG_QUERY_EXPANSION_NUMBER_OF_QUERIES:3}
rag.query-expansion.query-template=${RAG_QUERY_EXPANSION_QUERY_TEMPLATE:}
rag.query-expansion.timeout-millis=${RAG_QUERY_EXPANSION_TIMEOUT_MILLIS:2000}
rag.retrieval.keyword-heading-weight=${RAG_RETRIEVAL_KEYWORD_HEADING_WEIGHT:4.0}
rag.retrieval.keyword-title-weight=${RAG_RETRIEVAL_KEYWORD_TITLE_WEIGHT:1.5}
rag.retrieval.keyword-content-weight=${RAG_RETRIEVAL_KEYWORD_CONTENT_WEIGHT:1.0}
rag.retrieval.semantic-heading-weight=${RAG_RETRIEVAL_SEMANTIC_HEADING_WEIGHT:0.25}
rag.retrieval.keyword-candidate-multiplier=${RAG_RETRIEVAL_KEYWORD_CANDIDATE_MULTIPLIER:8}
rag.retrieval.keyword-candidate-top-k-max=${RAG_RETRIEVAL_KEYWORD_CANDIDATE_TOP_K_MAX:100}
rag.retrieval.hybrid-per-retriever-multiplier=${RAG_RETRIEVAL_HYBRID_PER_RETRIEVER_MULTIPLIER:2}
rag.retrieval.hybrid-per-retriever-top-k-max=${RAG_RETRIEVAL_HYBRID_PER_RETRIEVER_TOP_K_MAX:20}
rag.retrieval.multi-query-per-query-multiplier=${RAG_RETRIEVAL_MULTI_QUERY_PER_QUERY_MULTIPLIER:2}
rag.retrieval.multi-query-per-query-top-k-max=${RAG_RETRIEVAL_MULTI_QUERY_PER_QUERY_TOP_K_MAX:10}
rag.retrieval.semantic-candidate-multiplier=${RAG_RETRIEVAL_SEMANTIC_CANDIDATE_MULTIPLIER:3}
rag.retrieval.semantic-filtered-candidate-multiplier=${RAG_RETRIEVAL_SEMANTIC_FILTERED_CANDIDATE_MULTIPLIER:5}
rag.retrieval.semantic-candidate-top-k-max=${RAG_RETRIEVAL_SEMANTIC_CANDIDATE_TOP_K_MAX:50}
rag.retrieval.rrf-k=${RAG_RETRIEVAL_RRF_K:60.0}
rag.retrieval.neighbor-window-before=${RAG_RETRIEVAL_NEIGHBOR_WINDOW_BEFORE:1}
rag.retrieval.neighbor-window-after=${RAG_RETRIEVAL_NEIGHBOR_WINDOW_AFTER:1}
rag.retrieval.semantic-timeout-millis=${RAG_RETRIEVAL_SEMANTIC_TIMEOUT_MILLIS:1500}
rag.retrieval.keyword-timeout-millis=${RAG_RETRIEVAL_KEYWORD_TIMEOUT_MILLIS:1500}
rag.retrieval.query-timeout-millis=${RAG_RETRIEVAL_QUERY_TIMEOUT_MILLIS:3000}
rag.retrieval.answer-generation-timeout-millis=${RAG_RETRIEVAL_ANSWER_GENERATION_TIMEOUT_MILLIS:12000}

rag.rocketmq.enabled=${RAG_ROCKETMQ_ENABLED:false}
rag.rocketmq.endpoints=${RAG_ROCKETMQ_ENDPOINTS:}
rag.rocketmq.topic=${RAG_ROCKETMQ_TOPIC:rag-index-topic}
rag.rocketmq.tag=${RAG_ROCKETMQ_TAG:rag-index}
rag.rocketmq.consumer-group=${RAG_ROCKETMQ_CONSUMER_GROUP:rag-index-consumer}
rag.rocketmq.request-timeout-seconds=${RAG_ROCKETMQ_REQUEST_TIMEOUT_SECONDS:15}
rag.rocketmq.ssl-enabled=${RAG_ROCKETMQ_SSL_ENABLED:true}
rag.rocketmq.parse-failure-alert-threshold=${RAG_ROCKETMQ_PARSE_FAILURE_ALERT_THRESHOLD:3}
rag.rocketmq.parse-failure-payload-preview-length=${RAG_ROCKETMQ_PARSE_FAILURE_PAYLOAD_PREVIEW_LENGTH:1000}

# Outbox
rag.outbox.enabled=${RAG_OUTBOX_ENABLED:true}
rag.outbox.retry-backoff-millis=${RAG_OUTBOX_RETRY_BACKOFF_MILLIS:10000}
rag.outbox.batch-size=${RAG_OUTBOX_BATCH_SIZE:20}
rag.outbox.dispatch-fixed-delay-millis=${RAG_OUTBOX_DISPATCH_FIXED_DELAY_MILLIS:1000}
rag.outbox.sending-stale-millis=${RAG_OUTBOX_SENDING_STALE_MILLIS:60000}

# Recovery
rag.recovery.enabled=${RAG_RECOVERY_ENABLED:true}
rag.recovery.fixed-delay-millis=${RAG_RECOVERY_FIXED_DELAY_MILLIS:60000}
rag.recovery.pending-stale-millis=${RAG_RECOVERY_PENDING_STALE_MILLIS:300000}
rag.recovery.processing-stale-millis=${RAG_RECOVERY_PROCESSING_STALE_MILLIS:600000}
rag.recovery.failed-retry-millis=${RAG_RECOVERY_FAILED_RETRY_MILLIS:3600000}
rag.recovery.batch-size=${RAG_RECOVERY_BATCH_SIZE:20}

# Milvus
rag.milvus.enabled=${RAG_MILVUS_ENABLED:false}
rag.milvus.uri=${RAG_MILVUS_URI:}
rag.milvus.token=${RAG_MILVUS_TOKEN:}
rag.milvus.database-name=${RAG_MILVUS_DATABASE_NAME:}
rag.milvus.collection-name=${RAG_MILVUS_COLLECTION_NAME:rag_chunks}
rag.milvus.embedding-dimension=${RAG_MILVUS_EMBEDDING_DIMENSION:1024}
rag.milvus.similarity-threshold=${RAG_MILVUS_SIMILARITY_THRESHOLD:0.2}
