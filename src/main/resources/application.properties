# \u672C\u5730\u5F00\u53D1\uFF1A\u4ECE\u9879\u76EE\u6839\u76EE\u5F55\u7684 .env \u52A0\u8F7D\u771F\u5B9E\u914D\u7F6E\uFF08gitIgnored\uFF09\uFF1Bprod \u73AF\u5883\u65E0\u6B64\u6587\u4EF6\u65F6\u81EA\u52A8\u8DF3\u8FC7
spring.config.import=optional:file:./.env[.properties]
spring.application.name=${SPRING_APPLICATION_NAME:server}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
# 本项目显式拆分 chat / embedding OpenAI-compatible client；未使用的 OpenAI 模型避免默认自动配置误拉起。
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.image=none
spring.ai.model.moderation=none
graph.agent.intent-llm.api-key=${DEEPSEEK_API_KEY:}
graph.agent.intent-llm.base-url=${DEEPSEEK_BASE_URL:https://api.deepseek.com}
graph.agent.intent-llm.completions-path=${DEEPSEEK_COMPLETIONS_PATH:/chat/completions}
graph.agent.intent-llm.model=${DEEPSEEK_MODEL:deepseek-v4-flash}
graph.agent.intent-llm.temperature=${DEEPSEEK_TEMPERATURE:0}
graph.agent.intent-llm.max-tokens=${DEEPSEEK_MAX_TOKENS:1024}
graph.agent.intent-llm.timeout=${DEEPSEEK_TIMEOUT:10s}
logging.structured.ecs.service.name=${LOGGING_STRUCTURED_ECS_SERVICE_NAME:${spring.application.name}}
logging.structured.ecs.service.environment=${LOGGING_STRUCTURED_ECS_SERVICE_ENVIRONMENT:${spring.profiles.active:dev}}
logging.structured.json.stacktrace.root=first
logging.structured.json.stacktrace.max-length=${LOGGING_STRUCTURED_JSON_STACKTRACE_MAX_LENGTH:8192}
logging.structured.json.stacktrace.include-hashes=true
# \u5C06 OTel trace \u4E0A\u4E0B\u6587\u6CE8\u5165 MDC\uFF0C\u8BA9 ECS \u7ED3\u6784\u5316\u65E5\u5FD7\u643A\u5E26 trace.id / span.id\uFF0C
# \u5373\u4F7F\u672A\u5BFC\u51FA trace \u4E5F\u80FD\u5728 Kibana \u4E2D\u901A\u8FC7\u65E5\u5FD7\u5173\u8054\u5230\u94FE\u8DEF\u3002
logging.pattern.correlation=[%X{trace.id:-} %X{span.id:-}]
management.tracing.baggage.correlation.fields=trace.id,span.id
# Actuator \u5B89\u5168\u9ED8\u8BA4\u914D\u7F6E \u2014\u2014 \u5404 profile \u53EF\u6309\u9700\u653E\u5F00\uFF0C\u4F46\u5373\u4FBF profile \u914D\u7F6E\u7F3A\u5931\u6216\u88AB\u90E8\u5206\u8986\u76D6\uFF0C
# \u57FA\u7EBF\u4E5F\u5FC5\u987B\u662F\u5B89\u5168\u7684\u3002
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.loggers.access=read_only
