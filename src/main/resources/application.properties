spring.application.name=${SPRING_APPLICATION_NAME:backend}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
logging.structured.ecs.service.name=${LOGGING_STRUCTURED_ECS_SERVICE_NAME:${spring.application.name}}
logging.structured.ecs.service.environment=${LOGGING_STRUCTURED_ECS_SERVICE_ENVIRONMENT:${spring.profiles.active:dev}}
logging.structured.json.stacktrace.root=first
logging.structured.json.stacktrace.max-length=${LOGGING_STRUCTURED_JSON_STACKTRACE_MAX_LENGTH:8192}
logging.structured.json.stacktrace.include-hashes=true
# \u5C06 OTel trace \u4E0A\u4E0B\u6587\u6CE8\u5165 MDC\uFF0C\u8BA9 ECS \u7ED3\u6784\u5316\u65E5\u5FD7\u643A\u5E26 trace.id / span.id\uFF0C
# \u5373\u4F7F\u672A\u5BFC\u51FA trace \u4E5F\u80FD\u5728 Kibana \u4E2D\u901A\u8FC7\u65E5\u5FD7\u5173\u8054\u5230\u94FE\u8DEF\u3002
logging.pattern.correlation=[%X{trace.id:-} %X{span.id:-}]
management.tracing.baggage.correlation.fields=trace.id,span.id
# Actuator \u5B89\u5168\u9ED8\u8BA4\u914D\u7F6E \u2014\u2014 \u5404 profile \u53EF\u6309\u9700\u653E\u5F00\uFF0C\u4F46\u5373\u4FBF profile \u914D\u7F6E\u7F3A\u5931\u6216\u88AB\u90E8\u5206\u8986\u76D6\uFF0C
# \u57FA\u7EBF\u4E5F\u5FC5\u987B\u662F\u5B89\u5168\u7684\u3002
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.loggers.access=read_only