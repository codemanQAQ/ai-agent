spring.application.name=backend-test
logging.structured.ecs.service.environment=test

spring.datasource.url=jdbc:h2:mem:ragtest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.sql.init.mode=never
spring.autoconfigure.exclude=org.apache.rocketmq.client.autoconfigure.RocketMQAutoConfiguration

rag.rocketmq.enabled=false
rag.milvus.enabled=false
rag.outbox.enabled=false
rag.recovery.enabled=false
rag.notification.final-failure-email.enabled=false

management.health.redis.enabled=false
management.endpoints.web.exposure.include=health,info,metrics,loggers

spring.ai.openai.api-key=test-key
spring.ai.openai.speech.api-key=test-key
